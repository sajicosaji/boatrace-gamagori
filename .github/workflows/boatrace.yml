name: BoatRace Auto Discord

on:
  schedule:
    # 予想送信: 待機ループ方式。各実行が最大130分生存して締切10分前に順次送信。
    # concurrency で直列化し、4本立てで JST 14:30〜21:00 を途切れずカバーする。
    # （JST = UTC+9。GitHubのcronは遅延・間引きがあるため多めに重ねている）
    - cron: "30 5 * * *"
    - cron: "30 7 * * *"
    - cron: "30 9 * * *"
    - cron: "30 11 * * *"
    # 結果サマリー: 全レース終了後（JST 21:50 = UTC 12:50）
    - cron: "50 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        type: choice
        options:
          - predict
          - results
        default: predict

permissions:
  contents: write

jobs:
  send:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule != '50 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'predict')
    runs-on: ubuntu-latest
    timeout-minutes: 140
    concurrency:
      group: boatrace-send
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check and send (wait-loop)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AHEAD_MINUTES: "10"
          MAX_RUNTIME_MIN: "130"
          # 勝負レース（期待値プラスの買い目があるレース）だけDiscordに送信する
          HOT_ONLY: "1"
          # 送信記録を sent/ に書き、コミットして夜の結果検証と共有する
          PREDICTION_LOG_DIR: "sent"
          PYTHONIOENCODING: "utf-8"
        run: python check_and_send.py

      - name: Commit sent log
        if: always()
        run: |
          git config user.name "boatrace-bot"
          git config user.email "boatrace-bot@users.noreply.github.com"
          git add sent/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "log: sent predictions"
            git pull --rebase origin master || true
            git push origin HEAD:master || echo "push failed (non-fatal)"
          fi

  results:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '50 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'results')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily results summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONIOENCODING: "utf-8"
        run: python results.py --discord
